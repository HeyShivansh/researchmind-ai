# Alembic configuration for ResearchMind AI.
# Database URL is set at runtime by the application settings (app.core.config).
# ===========================================================================

[alembic]
# Path to migration scripts (relative to this ini file).
script_location = %(here)s/alembic

# Prepend the project root to sys.path so we can import app.* modules.
prepend_sys_path = .

# Max length of the human-readable slug in migration filenames.
truncate_slug_length = 40

# Run the environment for the 'revision' command so autogenerate can inspect
# both the current database and the model metadata.
revision_environment = true

# The database URL is a placeholder only — env.py overrides it with the value
# from the application Settings object.  This keeps configuration in one place.
sqlalchemy.url = placeholder

# --------------------------------------------------------------------------
# post_write_hooks — format generated migration files with black
# --------------------------------------------------------------------------
[post_write_hooks]
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 88 REVISION_SCRIPT_FILENAME

# --------------------------------------------------------------------------
# Logging
# --------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
